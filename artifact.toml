kind = "web"
previewPath = "/"
title = "Logic Sieve"
version = "1.0.0"
id = "artifacts/logic-sieve"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21945

[services.development]
run = "pnpm --filter @workspace/logic-sieve run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logic-sieve", "run", "build" ]
publicDir = "artifacts/logic-sieve/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21945"
BASE_PATH = "/"
